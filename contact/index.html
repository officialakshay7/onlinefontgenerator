<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – OnlineFontGenerator.org</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://onlinefontgenerator.org/contact/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.85em' font-size='72' font-family='serif' font-style='italic' fill='white' x='12'>F</text></svg>">
  <style>.legal { max-width:720px;margin:0 auto; } .legal h2 { font-size:1.2rem;font-weight:700;margin:28px 0 10px; } .legal p,.legal li { color:var(--text-2);line-height:1.75;margin-bottom:12px;font-size:.93rem; } .legal ul { padding-left:20px; } .contact-form {max-width:600px;margin:0 auto;} .form-group {margin-bottom:18px;} .form-group label {display:block;font-weight:600;font-size:.85rem;margin-bottom:6px;color:var(--text-2);} .form-group input,.form-group textarea,.form-group select {width:100%;padding:11px 14px;background:var(--bg-2);border:1.5px solid var(--border);border-radius:var(--r-md);color:var(--text);font-family:inherit;font-size:.93rem;outline:none;transition:border-color .2s;} .form-group input:focus,.form-group textarea:focus {border-color:var(--accent);} .form-group textarea {min-height:110px;resize:vertical;} .submit-btn {display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--accent);color:#fff;border-radius:var(--r-pill);font-weight:700;font-size:.9rem;cursor:pointer;border:none;font-family:inherit;transition:opacity .2s;} .submit-btn:hover{opacity:.85;}</style>
</head>
<body>
<header class="site-header" id="siteHeader">
  <nav class="nav container">
    <a href="/" class="logo"><span class="logo-mark">F</span><span>FontGenerator</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="nav-link">← Generator</a></li>
      <li><a href="/blog/" class="nav-link">Blog</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn" id="themeBtn" aria-label="Toggle theme"><span class="theme-icon">☾</span></button>
      <button class="burger" id="burgerBtn" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
</header>
<main>
  <section class="page-hero">
    <div class="container">
      <nav class="breadcrumb"><a href="/">Home</a> <span>›</span> <span>Contact Us</span></nav>
      <h1>Contact Us</h1>
    </div>
  </section>
  <section class="section"><div class="container"><div class="contact-form">
  <div class="form-group"><label for="cname">Your Name</label><input type="text" id="cname" placeholder="Jane Doe" autocomplete="name"></div>
  <div class="form-group"><label for="cemail">Email Address</label><input type="email" id="cemail" placeholder="you@example.com" autocomplete="email"></div>
  <div class="form-group"><label for="csubj">Subject</label>
    <select id="csubj"><option>Suggest a new font style</option><option>Report a bug</option><option>General question</option><option>Business inquiry</option><option>Other</option></select>
  </div>
  <div class="form-group"><label for="cmsg">Message</label><textarea id="cmsg" placeholder="Tell us what's on your mind…"></textarea></div>
  <button class="submit-btn" onclick="document.getElementById('cfeedback').style.display='block';this.disabled=true;this.textContent='Sent!'">Send Message →</button>
  <p id="cfeedback" style="display:none;margin-top:16px;color:var(--green);font-weight:600;">✓ Thanks! We'll get back to you soon.</p>
</div></div></section>
</main>
<div class="toast" id="toast"></div>
<footer class="site-footer"><div class="container"><div class="footer-bottom"><p>© 2026 OnlineFontGenerator.org — <a href="/" style="color:var(--accent)">Back to Generator</a></p></div></div></footer>
<script src="/js/fonts.js"></script><script src="/js/main.js"></script>
</body></html>
