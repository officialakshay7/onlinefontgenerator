    .not-found {

      color: var(--text-2);
      font-size: .95rem;

      line-height: 1.65;
    }
    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;

      border-radius: var(--r-pill);
      font-weight: 700;
      font-size: .9rem;
      transition: opacity .2s;
    }

      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }
    .nf-link {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-size: .82rem;
      color: var(--text-2);
